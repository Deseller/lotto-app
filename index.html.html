<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #F7931E;
            --accent: #FEC601;
            --dark: #1A1A2E;
            --light: #FEFEFE;
            --ball-1: #FFC300;
            --ball-2: #4E9AF1;
            --ball-3: #FF5733;
            --ball-4: #A5A5A5;
            --ball-5: #00D26A;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 배경 애니메이션 원들 */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -200px;
            right: -200px;
            animation-delay: 0s;
        }

        body::after {
            width: 300px;
            height: 300px;
            bottom: -150px;
            left: -150px;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        .container {
            background: var(--light);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            color: var(--primary);
            letter-spacing: 3px;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.1);
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .games-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .game-btn {
            background: #f0f0f0;
            border: 3px solid transparent;
            border-radius: 15px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .game-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: var(--accent);
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.6);
        }

        .generate-btn:active {
            transform: translateY(-1px);
        }

        .results {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-set {
            background: #f8f8f8;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .game-set::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }

        .game-label {
            font-size: 14px;
            font-weight: 700;
            color: #999;
            margin-bottom: 15px;
            margin-left: 10px;
        }

        .numbers {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-family: 'Bebas Neue', sans-serif;
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2) rotate(180deg);
            }
            100% {
                transform: scale(1) rotate(360deg);
                opacity: 1;
            }
        }

        .ball::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        /* 번호별 색상 */
        .ball[data-range="1"] { background: linear-gradient(135deg, #FFC300, #FFD700); }
        .ball[data-range="2"] { background: linear-gradient(135deg, #4E9AF1, #2E7DD8); }
        .ball[data-range="3"] { background: linear-gradient(135deg, #FF5733, #E84118); }
        .ball[data-range="4"] { background: linear-gradient(135deg, #A5A5A5, #707070); }
        .ball[data-range="5"] { background: linear-gradient(135deg, #00D26A, #00A854); }

        .bonus-ball {
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(254, 198, 1, 0.6);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 36px;
            }

            .ball {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .games-selector {
                flex-wrap: wrap;
            }

            .game-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍀 LOTTO 645</h1>
            <p>당신의 행운을 찾아보세요</p>
        </div>

        <div class="games-selector">
            <button class="game-btn active" data-games="1">1게임</button>
            <button class="game-btn" data-games="2">2게임</button>
            <button class="game-btn" data-games="3">3게임</button>
            <button class="game-btn" data-games="5">5게임</button>
        </div>

        <button class="generate-btn" id="generateBtn">번호 생성하기</button>

        <div class="results" id="results">
            <div class="empty-state">
                <div class="empty-state-icon">🎱</div>
                <p>위 버튼을 눌러 행운의 번호를 생성해보세요!</p>
            </div>
        </div>

        <div class="actions" id="actions" style="display: none;">
            <button class="action-btn" id="copyBtn">📋 복사</button>
            <button class="action-btn" id="shareBtn">📤 공유</button>
            <button class="action-btn" id="saveBtn">💾 저장</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let selectedGames = 1;
        let currentNumbers = [];

        // 게임 수 선택
        document.querySelectorAll('.game-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedGames = parseInt(btn.dataset.games);
            });
        });

        // 로또 번호 생성 함수
        function generateLottoNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            return numbers.sort((a, b) => a - b);
        }

        // 번호 범위에 따른 색상 그룹
        function getNumberRange(num) {
            if (num <= 10) return '1';
            if (num <= 20) return '2';
            if (num <= 30) return '3';
            if (num <= 40) return '4';
            return '5';
        }

        // 번호 생성 버튼
        document.getElementById('generateBtn').addEventListener('click', () => {
            currentNumbers = [];
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            for (let i = 0; i < selectedGames; i++) {
                const numbers = generateLottoNumbers();
                currentNumbers.push(numbers);

                const gameSet = document.createElement('div');
                gameSet.className = 'game-set';
                gameSet.innerHTML = `
                    <div class="game-label">${String.fromCharCode(65 + i)}게임</div>
                    <div class="numbers">
                        ${numbers.map((num, idx) => `
                            <div class="ball" data-range="${getNumberRange(num)}" 
                                 style="animation-delay: ${idx * 0.1}s">
                                ${num}
                            </div>
                        `).join('')}
                    </div>
                `;
                resultsDiv.appendChild(gameSet);
            }

            document.getElementById('actions').style.display = 'flex';
        });

        // 복사 버튼
        document.getElementById('copyBtn').addEventListener('click', () => {
            let text = '';
            currentNumbers.forEach((numbers, idx) => {
                text += `${String.fromCharCode(65 + idx)}게임: ${numbers.join(', ')}\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 번호가 복사되었습니다!');
            });
        });

        // 공유 버튼
        document.getElementById('shareBtn').addEventListener('click', () => {
            let text = '🍀 행운의 로또 번호 🍀\n\n';
            currentNumbers.forEach((numbers, idx) => {
                text += `${String.fromCharCode(65 + idx)}게임: ${numbers.join(', ')}\n`;
            });

            if (navigator.share) {
                navigator.share({
                    title: '행운의 로또 번호',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text);
                showToast('📤 번호가 복사되었습니다!');
            }
        });

        // 저장 버튼
        document.getElementById('saveBtn').addEventListener('click', () => {
            const saved = JSON.parse(localStorage.getItem('lottoHistory') || '[]');
            const now = new Date();
            saved.push({
                date: now.toLocaleString('ko-KR'),
                numbers: currentNumbers
            });
            localStorage.setItem('lottoHistory', JSON.stringify(saved));
            showToast('💾 번호가 저장되었습니다!');
        });

        // 토스트 메시지
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
